services:


  catalogdb:
    image: mongo:7
    volumes:
      - catalog_mongo_data:/data/db

  orderdb:
    image: mongo:7
    volumes:
      - order_mongo_data:/data/db

  basketdb:
    image: redis:alpine
    volumes:
      - basket_redis_data:/data

  discountdb:
    image: postgres:17
    volumes:
      - discount_pg_data:/var/lib/postgresql/data


  userdb:
    image: postgres:17
    volumes:
      - user_pg_data:/var/lib/postgresql/data

  authdb:
    image: postgres:17
    volumes:
      - auth_pg_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management-alpine

  

  basket.api:
    image: ${DOCKER_REGISTRY-}basketapi
    build:
      context: .
      dockerfile: Services/Basket/Basket.API/Dockerfile

  catalog.api:
    image: ${DOCKER_REGISTRY-}catalogapi
    build:
      context: .
      dockerfile: Services/Catalog/Catalog.API/Dockerfile
     


  discount.api:
    image: ${DOCKER_REGISTRY-}discountapi
    build:
      context: .
      dockerfile: Services/Discount/Discount.API/Dockerfile


  discount.grpc:
    image: ${DOCKER_REGISTRY-}discountgrpc
    build:
      context: .
      dockerfile: Services/Discount/Discount.GRPC/Dockerfile
 

  ordering.api:
    image: ${DOCKER_REGISTRY-}orderingapi
    build:
      context: .
      dockerfile: Services/Ordering/Ordering.API/Dockerfile



  ocelotapigw:
    image: ${DOCKER_REGISTRY-}ocelotapigw
    build:
      context: .
      dockerfile: ApiGateways/OcelotApiGw/Dockerfile

  user.api:
    image: ${DOCKER_REGISTRY-}userapi
    build:
      context: .
      dockerfile: Services/User/User.API/Dockerfile



  authentication.api:
    image: ${DOCKER_REGISTRY-}authenticationapi
    build:
      context: .
      dockerfile: Services/Authentication/Authentication.API/Dockerfile





  frontend-customer:
    build:
      context: ./Frontend-Customer
      dockerfile: Dockerfile
    ports:
      - "3005:80"



  frontend-admin:
    build:
      context: ./Frontend-Admin
      dockerfile: Dockerfile
    ports:
      - "3006:80"


volumes:
  catalog_mongo_data:
  order_mongo_data:

  discount_pg_data:
  user_pg_data:
  auth_pg_data:

  basket_redis_data:

